name: Robot Framework Tests API

##################################################
# Eventos
##################################################

on:

  # Execução automática após push
  push:
    branches:
      - main

  # Execução automática em Pull Request
  pull_request:
    branches:
      - main

  # Execução manual
  workflow_dispatch:


##################################################
# Variáveis de Ambiente
##################################################

env:
  BASE_URL: ${{ secrets.BASE_URL }}
  API_USERNAME: ${{ secrets.API_USERNAME }}
  API_PASSWORD: ${{ secrets.API_PASSWORD }}


##################################################
# Jobs
##################################################

jobs:

  robot-tests:

    name: Execute Robot Framework Tests

    runs-on: ubuntu-latest

    steps:

      ##################################################
      # Checkout do repositório
      ##################################################

      - name: Checkout repository
        uses: actions/checkout@v4


      ##################################################
      # Configuração do Python
      ##################################################

      - name: Setup Python
        uses: actions/setup-python@v5

        with:
          python-version: "3.9"


      ##################################################
      # Informações do ambiente (diagnóstico)
      ##################################################

      - name: Show environment information

        run: |

          echo "====================================="
          echo "Python Version"
          echo "====================================="
          python --version

          echo ""

          echo "====================================="
          echo "Operating System"
          echo "====================================="
          uname -a

          echo ""

          echo "====================================="
          echo "Repository Files"
          echo "====================================="
          ls -la

          echo ""

          echo "====================================="
          echo "Tests Directory"
          echo "====================================="
          ls -la tests || true


      ##################################################
      # Instalação das dependências
      ##################################################

      - name: Install dependencies

        run: |

          python -m pip install --upgrade pip

          pip install -r requirements.txt


      ##################################################
      # Validação das variáveis de ambiente
      ##################################################

      - name: Validate environment variables

        run: |

          echo "Checking environment variables..."

          if [ -z "$BASE_URL" ]; then
            echo "ERROR: BASE_URL is empty"
            exit 1
          fi

          if [ -z "$API_USERNAME" ]; then
            echo "ERROR: API_USERNAME is empty"
            exit 1
          fi

          if [ -z "$API_PASSWORD" ]; then
            echo "ERROR: API_PASSWORD is empty"
            exit 1
          fi

          echo "BASE_URL configured"
          echo "API_USERNAME configured"
          echo "API_PASSWORD configured"


      ##################################################
      # Execução dos testes Robot Framework
      ##################################################

      - name: Execute Robot Tests

        run: |

          mkdir -p results

          robot \
            --outputdir results \
            --loglevel DEBUG \
            tests


      ##################################################
      # Geração do Dashboard
      #
      # Toda a geração do Summary acontece
      # dentro do arquivo:
      #
      # scripts/robot_summary.py
      ##################################################

      - name: Generate Robot Dashboard

        if: always()

        run: |

          python scripts/robot_summary.py


      ##################################################
      # Publicação dos artefatos
      #
      # Estes arquivos poderão ser baixados
      # diretamente pelo GitHub.
      ##################################################

      - name: Upload Robot Reports

        if: always()

        uses: actions/upload-artifact@v4

        with:

          name: robot-results

          path: results/