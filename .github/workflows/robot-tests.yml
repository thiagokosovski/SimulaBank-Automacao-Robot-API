name: Robot Framework Tests API


on:

  push:
    branches:
      - main


  pull_request:
    branches:
      - main


  workflow_dispatch:



env:

  BASE_URL: ${{ secrets.BASE_URL }}
  API_USERNAME: ${{ secrets.API_USERNAME }}
  API_PASSWORD: ${{ secrets.API_PASSWORD }}




jobs:


  robot-tests:


    name: Execute Robot Framework Tests


    runs-on: ubuntu-latest



    steps:



      - name: Checkout repository

        uses: actions/checkout@v4




      - name: Setup Python

        uses: actions/setup-python@v5

        with:

          python-version: "3.9"




      - name: Show environment information

        run: |

          echo "====================================="

          echo "Python version"

          echo "====================================="

          python --version


          echo ""

          echo "====================================="

          echo "Repository files"

          echo "====================================="

          ls -la


          echo ""

          echo "====================================="

          echo "Tests directory"

          echo "====================================="

          ls -la tests || true




      - name: Install dependencies

        run: |

          echo "Installing dependencies..."

          python -m pip install --upgrade pip

          pip install -r requirements.txt




      - name: Validate environment variables

        run: |

          echo "Checking environment variables..."


          if [ -z "$BASE_URL" ]; then
            echo "ERROR: BASE_URL is empty"
            exit 1
          fi


          if [ -z "$API_USERNAME" ]; then
            echo "ERROR: API_USERNAME is empty"
            exit 1
          fi


          if [ -z "$API_PASSWORD" ]; then
            echo "ERROR: API_PASSWORD is empty"
            exit 1
          fi


          echo "BASE_URL configured"

          echo "API_USERNAME configured"

          echo "API_PASSWORD configured"




      - name: Execute Robot Tests

        run: |

          mkdir -p results


          robot \
            --outputdir results \
            --loglevel DEBUG \
            tests




      - name: Generate Execution Summary

        if: always()

        run: |

          echo "# 🤖 Robot Framework API Execution" >> $GITHUB_STEP_SUMMARY

          echo "" >> $GITHUB_STEP_SUMMARY



          echo "## Workflow Information" >> $GITHUB_STEP_SUMMARY

          echo "" >> $GITHUB_STEP_SUMMARY


          echo "| Item | Value |" >> $GITHUB_STEP_SUMMARY

          echo "|------|-------|" >> $GITHUB_STEP_SUMMARY

          echo "| Workflow | $GITHUB_WORKFLOW |" >> $GITHUB_STEP_SUMMARY

          echo "| Repository | $GITHUB_REPOSITORY |" >> $GITHUB_STEP_SUMMARY

          echo "| Branch | $GITHUB_REF_NAME |" >> $GITHUB_STEP_SUMMARY

          echo "| Commit | $(echo $GITHUB_SHA | cut -c1-7) |" >> $GITHUB_STEP_SUMMARY

          echo "| Runner | $RUNNER_OS |" >> $GITHUB_STEP_SUMMARY

          echo "| Python | $(python --version) |" >> $GITHUB_STEP_SUMMARY



          echo "" >> $GITHUB_STEP_SUMMARY


          echo "## Environment Variables" >> $GITHUB_STEP_SUMMARY

          echo "" >> $GITHUB_STEP_SUMMARY


          echo "| Variable | Status |" >> $GITHUB_STEP_SUMMARY

          echo "|----------|--------|" >> $GITHUB_STEP_SUMMARY


          echo "| BASE_URL | ✅ Configured |" >> $GITHUB_STEP_SUMMARY

          echo "| API_USERNAME | ✅ Configured |" >> $GITHUB_STEP_SUMMARY

          echo "| API_PASSWORD | ✅ Configured |" >> $GITHUB_STEP_SUMMARY




          echo "" >> $GITHUB_STEP_SUMMARY


          echo "## 📊 Test Execution Summary" >> $GITHUB_STEP_SUMMARY

          echo "" >> $GITHUB_STEP_SUMMARY


          echo "| Item | Value |" >> $GITHUB_STEP_SUMMARY

          echo "|------|-------|" >> $GITHUB_STEP_SUMMARY



          if [ -f results/output.xml ]; then

            TOTAL=$(grep -o '<test ' results/output.xml | wc -l)

            PASSED=$(grep -o 'status="PASS"' results/output.xml | wc -l)

            FAILED=$(grep -o 'status="FAIL"' results/output.xml | wc -l)


            if [ "$TOTAL" -gt 0 ]; then

              SUCCESS=$(awk "BEGIN {printf \"%.2f\", ($PASSED/$TOTAL)*100}")

            else

              SUCCESS="0.00"

            fi

            TOTAL=$(python - <<'PY'
            import xml.etree.ElementTree as ET

            tree = ET.parse("results/output.xml")
            root = tree.getroot()

            print(len(root.findall(".//test")))
            PY
                        )


                        PASSED=$(python - <<'PY'
            import xml.etree.ElementTree as ET

            tree = ET.parse("results/output.xml")
            root = tree.getroot()

            count = 0

            for test in root.findall(".//test"):
                status = test.find("status")

                if status is not None and status.attrib.get("status") == "PASS":
                    count += 1

            print(count)
            PY
                        )


                        FAILED=$(python - <<'PY'
            import xml.etree.ElementTree as ET

            tree = ET.parse("results/output.xml")
            root = tree.getroot()

            count = 0

            for test in root.findall(".//test"):
                status = test.find("status")

                if status is not None and status.attrib.get("status") == "FAIL":
                    count += 1

            print(count)
            PY
                        )


            echo "| Success Rate | $SUCCESS% |" >> $GITHUB_STEP_SUMMARY


          else

            echo "| Total Tests | N/A |" >> $GITHUB_STEP_SUMMARY

            echo "| Passed | N/A |" >> $GITHUB_STEP_SUMMARY

            echo "| Failed | N/A |" >> $GITHUB_STEP_SUMMARY

            echo "| Success Rate | N/A |" >> $GITHUB_STEP_SUMMARY

          fi




          echo "" >> $GITHUB_STEP_SUMMARY


          echo "## 🖥 Runtime" >> $GITHUB_STEP_SUMMARY

          echo "" >> $GITHUB_STEP_SUMMARY


          echo "| Item | Value |" >> $GITHUB_STEP_SUMMARY

          echo "|------|-------|" >> $GITHUB_STEP_SUMMARY


          echo "| Python | $(python --version) |" >> $GITHUB_STEP_SUMMARY

          echo "| Platform | $(uname -s) |" >> $GITHUB_STEP_SUMMARY

          echo "| Architecture | $(uname -m) |" >> $GITHUB_STEP_SUMMARY




          echo "" >> $GITHUB_STEP_SUMMARY


          echo "## 📂 Robot Reports" >> $GITHUB_STEP_SUMMARY

          echo "" >> $GITHUB_STEP_SUMMARY


          echo "✅ output.xml" >> $GITHUB_STEP_SUMMARY

          echo "✅ log.html" >> $GITHUB_STEP_SUMMARY

          echo "✅ report.html" >> $GITHUB_STEP_SUMMARY




      - name: Upload Robot Reports

        if: always()

        uses: actions/upload-artifact@v4

        with:

          name: robot-results

          path: results/