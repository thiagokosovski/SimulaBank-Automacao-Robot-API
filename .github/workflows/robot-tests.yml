name: Robot Framework Tests API

##################################################
# Eventos
##################################################

on:

  # Execução automática após push
  push:
    branches:
      - main

  # Execução automática em Pull Request
  pull_request:
    branches:
      - main

  # Execução manual
  workflow_dispatch:


##################################################
# Variáveis de Ambiente
##################################################

env:
  BASE_URL: ${{ secrets.BASE_URL }}
  API_USERNAME: ${{ secrets.API_USERNAME }}
  API_PASSWORD: ${{ secrets.API_PASSWORD }}


##################################################
# Jobs
##################################################

jobs:

  robot-tests:

    name: Execute Robot Framework Tests

    runs-on: ubuntu-latest

    steps:

      ##################################################
      # Checkout
      ##################################################

      - name: Checkout repository
        uses: actions/checkout@v4

      ##################################################
      # Python
      ##################################################

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      ##################################################
      # Informações do Ambiente
      ##################################################

      - name: Show environment information
        run: |

          echo "====================================="
          echo "Python version"
          echo "====================================="
          python --version

          echo ""
          echo "====================================="
          echo "Repository files"
          echo "====================================="
          ls -la

          echo ""
          echo "====================================="
          echo "Tests directory"
          echo "====================================="
          ls -la tests || true

      ##################################################
      # Instalar Dependências
      ##################################################

      - name: Install dependencies
        run: |

          echo "Installing dependencies..."

          python -m pip install --upgrade pip

          pip install -r requirements.txt

      ##################################################
      # Validar Variáveis
      ##################################################

      - name: Validate environment variables
        run: |

          echo "Checking environment variables..."

          if [ -z "$BASE_URL" ]; then
            echo "ERROR: BASE_URL is empty"
            exit 1
          fi

          if [ -z "$API_USERNAME" ]; then
            echo "ERROR: API_USERNAME is empty"
            exit 1
          fi

          if [ -z "$API_PASSWORD" ]; then
            echo "ERROR: API_PASSWORD is empty"
            exit 1
          fi

          echo "BASE_URL configured"
          echo "API_USERNAME configured"
          echo "API_PASSWORD configured"

      ##################################################
      # Executar Robot Framework
      ##################################################

      - name: Execute Robot Tests
        run: |

          mkdir -p results

          robot \
            --outputdir results \
            --loglevel DEBUG \
            tests

      ##################################################
      # Summary da Execução
      ##################################################

      - name: Generate Execution Summary
        if: always()
        run: |

          echo "# 🤖 Robot Framework API Execution" >> $GITHUB_STEP_SUMMARY

          echo "" >> $GITHUB_STEP_SUMMARY

          echo "## Workflow Information" >> $GITHUB_STEP_SUMMARY

          echo "" >> $GITHUB_STEP_SUMMARY

          echo "| Item | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Workflow | $GITHUB_WORKFLOW |" >> $GITHUB_STEP_SUMMARY
          echo "| Repository | $GITHUB_REPOSITORY |" >> $GITHUB_STEP_SUMMARY
          echo "| Branch | $GITHUB_REF_NAME |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | ${GITHUB_SHA::7} |" >> $GITHUB_STEP_SUMMARY
          echo "| Runner | $RUNNER_OS |" >> $GITHUB_STEP_SUMMARY
          echo "| Python | 3.9 |" >> $GITHUB_STEP_SUMMARY

          echo "" >> $GITHUB_STEP_SUMMARY

          echo "## Environment Variables" >> $GITHUB_STEP_SUMMARY

          echo "" >> $GITHUB_STEP_SUMMARY

          echo "| Variable | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|--------|" >> $GITHUB_STEP_SUMMARY

          if [ -n "$BASE_URL" ]; then
            echo "| BASE_URL | ✅ Configured |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| BASE_URL | ❌ Missing |" >> $GITHUB_STEP_SUMMARY
          fi

          if [ -n "$API_USERNAME" ]; then
            echo "| API_USERNAME | ✅ Configured |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| API_USERNAME | ❌ Missing |" >> $GITHUB_STEP_SUMMARY
          fi

          if [ -n "$API_PASSWORD" ]; then
            echo "| API_PASSWORD | ✅ Configured |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| API_PASSWORD | ❌ Missing |" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY

          echo "## Robot Reports" >> $GITHUB_STEP_SUMMARY

          echo "" >> $GITHUB_STEP_SUMMARY

          if [ -f results/output.xml ]; then
            echo "- ✅ output.xml" >> $GITHUB_STEP_SUMMARY
          else
            echo "- ❌ output.xml" >> $GITHUB_STEP_SUMMARY
          fi

          if [ -f results/log.html ]; then
            echo "- ✅ log.html" >> $GITHUB_STEP_SUMMARY
          else
            echo "- ❌ log.html" >> $GITHUB_STEP_SUMMARY
          fi

          if [ -f results/report.html ]; then
            echo "- ✅ report.html" >> $GITHUB_STEP_SUMMARY
          else
            echo "- ❌ report.html" >> $GITHUB_STEP_SUMMARY
          fi

      ##################################################
      # Upload dos Relatórios
      ##################################################

      - name: Upload Robot Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: robot-results
          path: results/